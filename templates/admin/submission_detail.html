{% extends "admin/base_admin.html" %}
{% block admin_content %}
<div class="card" data-page="submission-detail" data-submission-id="{{ sub.id }}">
  <div class="topbar">
    <h1>👁️ Review Submission</h1>
    <a class="btn btn-secondary" href="{{ url_for('admin_submissions') }}">← Back</a>
  </div>

  <div class="submission-details">
    <div class="detail-row">
      <label>👤 Candidate Name:</label>
      <p>{{ sub.candidate.name }}</p>
    </div>
    <div class="detail-row">
      <label>📧 Email:</label>
      <p>{{ sub.candidate.email }}</p>
    </div>
    <div class="detail-row">
      <label>❓ Question:</label>
      <p>{{ sub.question.text }}</p>
    </div>
    <div class="detail-row">
      <label>📅 Submitted:</label>
      <p>{{ sub.created_at.strftime('%Y-%m-%d %H:%M:%S') }}</p>
    </div>
  </div>

  <hr />

  <h2>🎙️ Audio Response</h2>
  <audio controls src="{{ url_for('uploaded_file', filename=sub.audio_filename) }}" style="width: 100%; margin: 12px 0;"></audio>

  <hr />

  <h2>📝 Transcript + Notes</h2>
  <form method="POST" id="submissionNotesForm">
    <div class="form-group">
      <label for="transcript">Transcript (optional)</label>
      <textarea id="transcript" name="transcript" rows="6" placeholder="Paste transcript text here (optional)…">{{ sub.transcript or "" }}</textarea>
    </div>

    <div class="form-group">
      <label for="feedback">Feedback / Notes</label>
      <textarea id="feedback" name="feedback" rows="8" placeholder="Write constructive feedback or internal notes…">{{ sub.feedback or "" }}</textarea>
    </div>
    <div class="form-actions">
      <button class="btn btn-success" type="submit">💾 Save Feedback</button>
    </div>
  </form>

  <hr />

  <form method="POST" action="{{ url_for('delete_submission', sid=sub.id) }}" onsubmit="return confirm('Delete this submission?');">
    <button class="btn btn-danger" type="submit">🗑️ Delete Submission</button>
  </form>
</div>
{% endblock %}
