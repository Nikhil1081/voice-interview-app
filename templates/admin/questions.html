{% extends "base.html" %}
{% block content %}
<div class="card">
  <div class="topbar">
    <h1>📋 Manage Interview Questions</h1>
    <a class="btn btn-secondary" href="{{ url_for('admin_dashboard') }}">← Back</a>
  </div>

  <div class="form-section">
    <h2>Add New Question</h2>
    <form method="POST" class="inline-form">
      <input type="text" name="text" placeholder="Enter a new interview question..." required />
      <button class="btn btn-success" type="submit">➕ Add Question</button>
    </form>
  </div>

  <hr />

  <h2>Current Questions</h2>
  {% if questions %}
    <div class="questions-list">
      {% for q in questions %}
      <div class="question-item">
        <form method="POST" action="{{ url_for('edit_question', qid=q.id) }}" class="edit-form">
          <input type="text" name="text" value="{{ q.text }}" required />
          <button class="btn btn-sm btn-primary" type="submit">✏️ Update</button>
        </form>

        <form method="POST" action="{{ url_for('delete_question', qid=q.id) }}"
              onsubmit="return confirm('Delete this question?');" class="delete-form">
          <button class="btn btn-sm btn-danger" type="submit">🗑️ Delete</button>
        </form>
      </div>
      {% endfor %}
    </div>
  {% else %}
    <p class="muted">No questions found.</p>
  {% endif %}
</div>
{% endblock %}
